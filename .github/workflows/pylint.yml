name: Analyse code for docstring issues only

run: |
  pylint --disable=all \
         --enable=missing-docstring,empty-docstring \
         $(git ls-files '*.py')

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docstring-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run pylint for docstring checks
        run: |
          pylint --disable=all \
                 --enable=missing-docstring,empty-docstring \
                 $(git ls-files '*.py')
